name: Continuous Integration (CI)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Java JRE (Required for Firebase Emulators)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run Linter
        run: npm run lint

      - name: Run Typecheck
        run: npm run typecheck

      - name: Run Firestore Security Rules Tests (via Emulator)
        run: npx firebase emulators:exec --only firestore,storage,auth "node firebase/test/firestore-rules.test.mjs"

      - name: Run Unit & Integration Tests (Vitest)
        run: npm test

      - name: Validate Production Build
        run: npm run build
